<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#071014">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>IFRI Mascot</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #071014;
      --panel: #101a20;
      --panel-2: #14232a;
      --line: #29424c;
      --text: #edf7f9;
      --muted: #8fa3aa;
      --cyan: #26d9d0;
      --green: #42e58b;
      --amber: #f3bd3b;
      --red: #ff5a66;
      --violet: #b983ff;
    }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      min-width: 100vw;
      min-height: 100dvh;
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      color: var(--text);
      background: var(--panel-2);
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    svg { display: block; pointer-events: none; }

    .portrait-lock {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      padding: 24px;
      text-align: center;
      background: var(--bg);
    }
    .portrait-lock svg { width: 72px; height: 72px; color: var(--cyan); }
    .portrait-lock strong { font-size: 1.2rem; }
    .portrait-lock span { color: var(--muted); max-width: 280px; line-height: 1.35; }

    .app {
      width: 100vw;
      height: 100dvh;
      padding: max(8px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
      gap: 8px;
      overflow: hidden;
    }
    .topbar {
      min-width: 0;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .status-left, .status-right {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-right { justify-content: flex-end; }
    .brand {
      white-space: nowrap;
      text-transform: uppercase;
      font-size: clamp(0.82rem, 2vw, 1.05rem);
      font-weight: 800;
      color: var(--cyan);
    }
    .pill {
      height: 28px;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 8px;
      border-radius: 7px;
      background: #0b151a;
      border: 1px solid var(--line);
      font-size: clamp(0.66rem, 1.45vw, 0.8rem);
      font-weight: 700;
      white-space: nowrap;
    }
    .pill svg { width: 15px; height: 15px; }
    .install-btn { color: var(--green); }
    .install-btn[hidden] { display: none; }
    .install-help-btn { color: var(--amber); }
    .install-help-btn[hidden] { display: none; }
    .mute-btn { color: var(--red); }
    .offline { color: var(--red); }

    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(150px, 0.95fr) minmax(190px, 1.05fr) minmax(190px, 1.1fr);
      gap: 8px;
      overflow: hidden;
    }
    .panel {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }
    .panel-title {
      height: 18px;
      flex: 0 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(0.62rem, 1.5vw, 0.74rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dpad {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .tool-btn {
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }
    .tool-btn:active, .tool-btn.active {
      border-color: var(--cyan);
      background: #173941;
    }
    .tool-btn svg { width: min(46%, 34px); height: min(46%, 34px); color: var(--cyan); }
    .stop-btn svg { color: var(--red); }

    .center-panel {
      display: grid;
      grid-template-rows: minmax(76px, 0.85fr) minmax(110px, 1.15fr);
    }
    .robot-zone {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .robot-ring {
      width: min(34vh, 120px);
      height: min(34vh, 120px);
      border: 2px solid #21434b;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }
    .robot-ring svg { width: 68%; height: 68%; color: var(--cyan); }
    .stats {
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }
    .stat {
      min-height: 0;
      display: grid;
      grid-template-columns: 20px 68px minmax(38px, 1fr) 54px;
      align-items: center;
      gap: 6px;
      padding: 0 7px;
      border-radius: 7px;
      background: #0b151a;
      border: 1px solid #1d3038;
      font-size: clamp(0.62rem, 1.55vw, 0.78rem);
    }
    .stat svg { width: 17px; height: 17px; color: var(--cyan); }
    .stat-label { color: var(--muted); white-space: nowrap; }
    .stat-value { text-align: right; font-weight: 800; white-space: nowrap; }
    .bar {
      height: 6px;
      border-radius: 999px;
      background: #203039;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--cyan);
      transition: width 160ms ease;
    }

    .right-stack {
      min-height: 0;
      display: grid;
      grid-template-rows: 1.05fr 0.95fr 0.95fr;
      gap: 8px;
      overflow: hidden;
    }
    .button-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      gap: 7px;
    }
    .actions { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .triple { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .action svg { color: var(--violet); }
    .safe svg { color: var(--green); }
    .warn svg { color: var(--amber); }
    .audio svg { color: var(--cyan); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(10px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(48px);
      max-width: 72vw;
      padding: 8px 12px;
      border-radius: 8px;
      background: #101a20;
      border: 1px solid var(--line);
      opacity: 0;
      pointer-events: none;
      transition: transform 160ms ease, opacity 160ms ease;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 10;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (orientation: portrait) {
      .portrait-lock { display: flex; }
      .app { display: none; }
    }

    @media (max-height: 410px) and (orientation: landscape) {
      .app { grid-template-rows: 36px minmax(0, 1fr); gap: 6px; padding: 6px 8px; }
      .topbar { border-radius: 7px; }
      .pill { height: 24px; padding: 0 6px; }
      .grid { gap: 6px; grid-template-columns: minmax(132px, 0.9fr) minmax(170px, 1fr) minmax(178px, 1.1fr); }
      .panel { gap: 5px; padding: 6px; border-radius: 7px; }
      .panel-title { height: 14px; flex-basis: 14px; }
      .dpad, .button-grid, .right-stack, .stats { gap: 5px; }
      .stat { grid-template-columns: 18px 58px minmax(30px, 1fr) 48px; gap: 4px; padding: 0 5px; }
      .robot-ring { width: min(30vh, 92px); height: min(30vh, 92px); }
    }

    @media (min-width: 980px) and (orientation: landscape) {
      .app { max-width: 1180px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="portrait-lock">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="7" width="18" height="10" rx="2"></rect>
      <path d="M8 3h8"></path>
      <path d="M8 21h8"></path>
      <path d="M12 3v4"></path>
      <path d="M12 17v4"></path>
    </svg>
    <strong>Mode paysage requis</strong>
    <span>Tournez le téléphone pour afficher les commandes.</span>
  </div>

  <main class="app">
    <header class="topbar">
      <div class="status-left">
        <span class="pill" id="battery-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="17" height="10" rx="2"></rect><path d="M22 11v2"></path></svg>
          <span id="battery">--%</span>
        </span>
        <span class="pill" id="wifi-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12.5a11 11 0 0 1 14 0"></path><path d="M8.5 16a6 6 0 0 1 7 0"></path><path d="M12 20h.01"></path></svg>
          <span id="wifi">ON</span>
        </span>
      </div>
      <div class="brand">IFRI Mascot</div>
      <div class="status-right">
        <button class="pill install-btn" id="install-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
          <span>Installer</span>
        </button>
        <button class="pill install-help-btn" id="install-help-btn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
          <span>Ajouter</span>
        </button>
        <button class="pill mute-btn" onclick="sendAction('mute')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5z"></path><path d="m19 9-6 6"></path><path d="m13 9 6 6"></path></svg>
        </button>
      </div>
    </header>

    <section class="grid">
      <section class="panel">
        <div class="panel-title">Déplacement</div>
        <div class="dpad">
          <div></div>
          <button class="tool-btn" data-cmd="forward" aria-label="Avancer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"></path><path d="m5 12 7-7 7 7"></path></svg></button>
          <div></div>
          <button class="tool-btn" data-cmd="left" aria-label="Gauche"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg></button>
          <button class="tool-btn stop-btn" data-cmd="stop" aria-label="Stop"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg></button>
          <button class="tool-btn" data-cmd="right" aria-label="Droite"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg></button>
          <div></div>
          <button class="tool-btn" data-cmd="backward" aria-label="Reculer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="m5 12 7 7 7-7"></path></svg></button>
          <div></div>
        </div>
      </section>

      <section class="panel center-panel">
        <div class="robot-zone">
          <div class="robot-ring">
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <rect x="31" y="35" width="38" height="34" rx="9"></rect>
              <rect x="33" y="15" width="34" height="22" rx="8"></rect>
              <circle cx="43" cy="26" r="2.8" fill="currentColor"></circle>
              <circle cx="57" cy="26" r="2.8" fill="currentColor"></circle>
              <path d="M50 15V7"></path>
              <circle cx="50" cy="5" r="2.5" fill="currentColor"></circle>
              <path d="M31 46 20 56v10"></path>
              <path d="M69 46 80 56v10"></path>
              <path d="M39 69v14l-7 8"></path>
              <path d="M61 69v14l7 8"></path>
            </svg>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"></path><path d="M7 8l-4 4 4 4"></path><path d="m17 8 4 4-4 4"></path></svg>
            <span class="stat-label">Distance</span>
            <div class="bar"><span id="dist-bar"></span></div>
            <span class="stat-value" id="distance">-- cm</span>
          </div>
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="17" height="10" rx="2"></rect><path d="M22 11v2"></path></svg>
            <span class="stat-label">Batterie</span>
            <div class="bar"><span id="batt-bar"></span></div>
            <span class="stat-value" id="battery-stat">--%</span>
          </div>
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h4l3-8 4 16 3-8h2"></path></svg>
            <span class="stat-label">État</span>
            <div></div>
            <span class="stat-value" id="state">--</span>
          </div>
          <div class="stat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>
            <span class="stat-label">Vitesse</span>
            <div></div>
            <span class="stat-value" id="speed">--</span>
          </div>
        </div>
      </section>

      <section class="right-stack">
        <section class="panel">
          <div class="panel-title">Actions</div>
          <div class="button-grid actions">
            <button class="tool-btn action" data-action="music" aria-label="Musique"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></button>
            <button class="tool-btn action" data-action="wave" aria-label="Salut"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 11V6a2 2 0 0 0-4 0v4"></path><path d="M14 10V4a2 2 0 0 0-4 0v8"></path><path d="M10 12V7a2 2 0 0 0-4 0v7"></path><path d="M18 8a2 2 0 0 1 2 2v4a6 6 0 0 1-12 0"></path></svg></button>
            <button class="tool-btn action" data-action="sleep" aria-label="Veille"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 18h9l-9-12h9"></path><path d="M15 9h5l-5 6h5"></path></svg></button>
            <button class="tool-btn warn" data-action="light" aria-label="Lumiere"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="M4.93 4.93l1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path></svg></button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">Autonomie</div>
          <div class="button-grid triple">
            <button class="tool-btn safe" data-action="auto" aria-label="Auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="5" width="16" height="14" rx="5"></rect><circle cx="9" cy="11" r="1"></circle><circle cx="15" cy="11" r="1"></circle><path d="M9 15c1.5 1 4.5 1 6 0"></path></svg></button>
            <button class="tool-btn safe" data-action="follow" aria-label="Suivi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"></circle><path d="M4 22a8 8 0 0 1 16 0"></path></svg></button>
            <button class="tool-btn warn" data-action="avoid" aria-label="Evitement"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 10 18H2L12 3z"></path><path d="M12 9v5"></path><path d="M12 18h.01"></path></svg></button>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">Audio</div>
          <div class="button-grid triple">
            <button class="tool-btn audio" data-action="speak" aria-label="Parler"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><path d="M12 18v4"></path></svg></button>
            <button class="tool-btn audio" data-action="volume_up" aria-label="Volume"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5z"></path><path d="M15 9a5 5 0 0 1 0 6"></path><path d="M18 6a9 9 0 0 1 0 12"></path></svg></button>
            <button class="tool-btn mute-btn" data-action="mute" aria-label="Muet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5z"></path><path d="m19 9-6 6"></path><path d="m13 9 6 6"></path></svg></button>
          </div>
        </section>
      </section>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.origin;
    let online = true;
    let deferredInstallPrompt = null;

    function byId(id) {
      return document.getElementById(id);
    }

    function showToast(message) {
      const toast = byId('toast');
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function isStandaloneApp() {
      return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    }

    function updateInstallControls() {
      const installButton = byId('install-btn');
      const helpButton = byId('install-help-btn');

      if (isStandaloneApp()) {
        installButton.hidden = true;
        helpButton.hidden = true;
        return;
      }

      installButton.hidden = !deferredInstallPrompt;
      helpButton.hidden = Boolean(deferredInstallPrompt);
    }

    function setActiveCommand(command) {
      document.querySelectorAll('[data-cmd]').forEach(button => {
        button.classList.toggle('active', button.dataset.cmd === command && command !== 'stop');
      });
    }

    function sendCmd(command) {
      setActiveCommand(command);
      fetch(`${API_BASE}/api/move?cmd=${encodeURIComponent(command)}`).catch(() => {});
      if (command !== 'stop') showToast(command.toUpperCase());
    }

    function sendAction(action) {
      fetch(`${API_BASE}/api/action?type=${encodeURIComponent(action)}`)
        .then(response => response.json())
        .then(data => showToast(data.msg || action))
        .catch(() => showToast('Connexion perdue'));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setBatteryColor(percent, isLow, isCritical) {
      const color = isCritical ? 'var(--red)' : isLow || percent <= 25 ? 'var(--amber)' : 'var(--green)';
      byId('batt-bar').style.background = color;
      byId('battery-pill').style.color = color;
    }

    async function pollStats() {
      try {
        const response = await fetch(`${API_BASE}/api/status`, { cache: 'no-store' });
        const data = await response.json();
        const distance = Number(data.distance || 0);
        const battery = clamp(Number(data.battery || 0), 0, 100);

        byId('distance').textContent = `${distance.toFixed(0)} cm`;
        byId('dist-bar').style.width = `${clamp(distance / 100 * 100, 0, 100)}%`;
        byId('battery').textContent = `${battery}%`;
        byId('battery-stat').textContent = `${battery}%`;
        byId('batt-bar').style.width = `${battery}%`;
        byId('state').textContent = data.state || '--';
        byId('speed').textContent = data.speed || '--';
        setBatteryColor(battery, data.batteryLow, data.batteryCritical);
        online = true;
      } catch (error) {
        online = false;
      }

      byId('wifi').textContent = online ? 'ON' : 'OFF';
      byId('wifi-pill').classList.toggle('offline', !online);
    }

    function bindHoldCommand(button) {
      const command = button.dataset.cmd;
      const start = event => {
        event.preventDefault();
        sendCmd(command);
      };
      const stop = event => {
        event.preventDefault();
        sendCmd('stop');
      };

      if (command === 'stop') {
        button.addEventListener('click', start);
        return;
      }

      button.addEventListener('pointerdown', start);
      button.addEventListener('pointerup', stop);
      button.addEventListener('pointercancel', stop);
      button.addEventListener('pointerleave', stop);
    }

    document.querySelectorAll('[data-cmd]').forEach(bindHoldCommand);
    document.querySelectorAll('[data-action]').forEach(button => {
      button.addEventListener('click', () => sendAction(button.dataset.action));
    });

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      deferredInstallPrompt = event;
      updateInstallControls();
    });

    byId('install-btn').addEventListener('click', async () => {
      if (!deferredInstallPrompt) {
        showToast('Menu navigateur: Ajouter');
        return;
      }

      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice.catch(() => {});
      deferredInstallPrompt = null;
      updateInstallControls();
    });

    byId('install-help-btn').addEventListener('click', () => {
      showToast('Menu navigateur: Ajouter');
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      updateInstallControls();
    });

    window.matchMedia('(display-mode: standalone)').addEventListener('change', updateInstallControls);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {});
    }

    window.addEventListener('contextmenu', event => event.preventDefault());
    updateInstallControls();
    window.setInterval(pollStats, 1000);
    pollStats();
  </script>
</body>
</html>
